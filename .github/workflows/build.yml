name: Test Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]

jobs:
  test_builds:
    name: ${{ matrix.os }} (${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,      compiler: Clang,  artifact: linux-amd64   }
          - { os: ubuntu-24.04-arm,   compiler: Clang,  artifact: linux-arm64   }
          - { os: windows-latest,     compiler: MSVC,   artifact: windows-amd64 }
          - { os: macos-15,           compiler: Clang,  artifact: macos-arm64   }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt-get install -y cmake build-essential ninja-build \
            libjack-jackd2-dev libpipewire-0.3-dev libpulse-dev libsndio-dev \
            libx11-dev libfribidi-dev libthai-dev libgl-dev libgles-dev \
            libdrm-dev libgbm-dev libwayland-dev libxkbcommon-dev \
            libegl-dev libwayland-egl-backend-dev

      - name: Install GCC (Linux)
        if: matrix.compiler == 'GCC' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV

      - name: Install Clang 22 (Linux)
        if: matrix.compiler == 'Clang' && runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all
          echo "CC=clang-22" >> $GITHUB_ENV
          echo "CXX=clang++-22" >> $GITHUB_ENV

      - name: Setup Clang (macOS)
        if: matrix.compiler == 'Clang' && runner.os == 'macOS'
        run: |
          brew install llvm
          LLVM_PREFIX=$(brew --prefix llvm)
          echo "CC=${LLVM_PREFIX}/bin/clang" >> $GITHUB_ENV
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> $GITHUB_ENV

      - name: Setup Clang (Windows)
        if: matrix.compiler == 'Clang' && runner.os == 'Windows'
        run: |
          choco install llvm -y
          echo "CC=clang" >> $env:GITHUB_ENV
          echo "CXX=clang++" >> $env:GITHUB_ENV

      - name: Setup MSVC (Windows)
        if: matrix.compiler == 'MSVC' && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup nasm (Windows arm64)
        if: runner.os == 'Windows' && runner.arch == 'ARM64'
        run: choco install nasm -y

      - name: CMake configure
        run: cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Stage binaries (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp -r build/bin/. staging/

      - name: Stage binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item -Path build\bin\* -Destination staging\ -Recurse

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'pull_request' }}
        with:
          name: build-${{ matrix.artifact }}
          path: staging/
          retention-days: 7
          if-no-files-found: error

      - name: Archive release binaries (Linux / macOS)
        if: github.event_name == 'release' && runner.os != 'Windows'
        run: |
          cd staging
          tar -czf ../${{ matrix.artifact }}.tar.gz .

      - name: Archive release binaries (Windows)
        if: github.event_name == 'release' && runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path staging\* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload to release (Linux / macOS)
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release' && runner.os != 'Windows'
        with:
          files: ${{ matrix.artifact }}.tar.gz

      - name: Upload to release (Windows)
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release' && runner.os == 'Windows'
        with:
          files: ${{ matrix.artifact }}.zip
